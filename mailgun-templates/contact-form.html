<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouveau message — Wado Innovations</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;color:#222323;">

  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#ffffff;padding:48px 24px;">
    <tr>
      <td align="center">
        <table width="520" cellpadding="0" cellspacing="0" role="presentation" style="max-width:520px;width:100%;">

          <!-- Logo -->
          <tr>
            <td style="padding-bottom:40px;border-bottom:1px solid #dde4f0;">
              <span style="font-size:16px;font-weight:700;color:#02477b;letter-spacing:-0.2px;">Wado Innovations</span>
            </td>
          </tr>

          <!-- Tag + Title -->
          <tr>
            <td style="padding-top:36px;padding-bottom:28px;">
              <p style="margin:0 0 10px 0;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#0d6ba8;">Formulaire de contact</p>
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#222323;line-height:1.3;">Message de {{name}}</h1>
            </td>
          </tr>

          <!-- Meta -->
          <tr>
            <td style="padding-bottom:28px;">
              <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td style="width:72px;padding-bottom:10px;vertical-align:top;">
                    <span style="font-size:13px;color:#a1a1aa;">Nom</span>
                  </td>
                  <td style="padding-bottom:10px;vertical-align:top;">
                    <span style="font-size:13px;color:#222323;font-weight:600;">{{name}}</span>
                  </td>
                </tr>
                <tr>
                  <td style="vertical-align:top;">
                    <span style="font-size:13px;color:#a1a1aa;">Email</span>
                  </td>
                  <td style="vertical-align:top;">
                    <a href="mailto:{{email}}" style="font-size:13px;color:#02477b;font-weight:600;text-decoration:none;">{{email}}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="height:1px;background-color:#dde4f0;font-size:0;">&nbsp;</td>
          </tr>

          <!-- Message -->
          <tr>
            <td style="padding-top:28px;padding-bottom:36px;">
              <p style="margin:0;font-size:14px;line-height:1.85;color:#3f3f46;white-space:pre-wrap;word-break:break-word;">{{message}}</p>
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td style="padding-bottom:48px;border-bottom:1px solid #dde4f0;">
              <a href="mailto:{{email}}?subject=Re%3A%20votre%20message%20%E2%80%94%20Wado%20Innovations"
                 style="display:inline-block;padding:11px 22px;background-color:#02477b;color:#ffffff;font-size:13px;font-weight:600;border-radius:6px;text-decoration:none;">
                Répondre à {{name}}
              </a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#a1a1aa;">
                <a href="https://wado-innovations.com" style="color:#a1a1aa;text-decoration:none;">wado-innovations.com</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
